{% extends 'base.html' %}
{% load static %}

{% block content %}
{% include 'Side_Navbar.html' %}
<div class="content-wrapper">

  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">

        </div>
        <div class="col-sm-6 text-end">

        </div>
      </div>
    </div>
  </section>


<div class="container mt-4">
    <script>
        const currentUserId = {{ request.session.employee_id }};
        const projectId = "{{ project.id }}"; // Pass from Django context
    </script>

    <style>
        #chat-box {
            height: 350px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            background-color: #f8f9fa;
        }
    </style>

    <div class="card">
        <div class="card-header bg-primary text-white">Team Chat</div>
        <div class="card-body">
            <div id="chat-box"></div>
            <div class="input-group mt-3">
                <input type="text" id="message" class="form-control" placeholder="Type your message..."
                       onkeypress="if(event.key==='Enter') sendMessage();">
                <div class="input-group-append">
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let last_id = 0;


            function fetchMessages() {
                fetch("{% url 'Chatbox:get_messages' %}?last_id=" + last_id + "&project_id=" + projectId)
                    .then(res => res.json())
                    .then(data => {
                        const box = document.getElementById("chat-box");
                        data.messages.forEach(msg => {
                            const line = `
                                <div class="chat-message"><strong>${msg.user}</strong><br>
                                    ${msg.content}
                                    <div class="text-muted small mt-1">${msg.timestamp}</div>
                                </div>`;
                            box.innerHTML += line;
                            last_id = msg.id;
                        });
                        box.scrollTop = box.scrollHeight;
                    });
            }

            function sendMessage() {
                const input = document.getElementById("message");
                const formData = new FormData();
                formData.append("message", input.value);
                formData.append("project_id", projectId);

                fetch("{% url 'Chatbox:send_message' %}", {
                    method: "POST",
                    headers: {
                        "X-CSRFToken": getCookie("csrftoken")
                    },
                    body: formData
                }).then(() => {
                    input.value = "";
                    fetchMessages();
                });
            }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let cookie of cookies) {
                    if (cookie.trim().startsWith(name + '=')) {
                        cookieValue = decodeURIComponent(cookie.trim().substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        setInterval(fetchMessages, 3000);
        window.onload = fetchMessages;
    </script>
</div>
</div>
{% endblock %}
